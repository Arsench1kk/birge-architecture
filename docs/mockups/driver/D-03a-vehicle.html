<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRGE Driver — Транспорт (2/4)</title>
    <style>
        :root {
            --blue: #0EA5E9;
            --blue-dark: #0284C7;
            --text: #0C1A2E;
            --text-gray: #64748B;
            --bg: #FFFFFF;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; color: var(--text); background: #F8FAFC; -webkit-font-smoothing: antialiased; }
        .screen { width: 393px; margin: 0 auto; background: var(--bg); min-height: 852px; position: relative; overflow-x: hidden; }
        
        /* HEADER */
        .header { position: fixed; top: 0; width: 393px; z-index: 100; padding: 59px 20px 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(14,165,233,0.12); box-sizing: border-box; }
        .header-row1 { display: flex; align-items: center; }
        .back-link { color: var(--blue); font-size: 15px; text-decoration: none; font-weight: 500; }
        .header-row2 { margin-top: 10px; font-size: 12px; color: var(--text-gray); text-align: right; }
        .header-row3 { margin-top: 6px; margin-bottom: 12px; width: 100%; height: 4px; background: #E0F2FE; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 50%; background: linear-gradient(90deg, #0EA5E9, #0284C7); border-radius: 2px; }

        /* CONTENT */
        .content { margin-top: 130px; padding: 20px; padding-bottom: 120px; }
        .title { font-size: 28px; font-weight: 700; color: #0C1A2E; margin: 0; }
        .subtitle { font-size: 15px; color: var(--text-gray); margin-top: 6px; margin-bottom: 0; }
        
        .form-fields { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .input-group { display: flex; flex-direction: column; }
        .input-label { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; }
        .input-field { width: 100%; height: 52px; background: rgba(241,245,249,0.8); border: 1.5px solid rgba(14,165,233,0.1); border-radius: 14px; padding: 0 16px; font-size: 16px; color: var(--text); box-sizing: border-box; outline: none; }
        .input-field::placeholder { color: #94A3B8; }
        
        /* COLOR PICKER */
        .color-row { display: flex; gap: 10px; margin-top: 4px; }
        .color-circle { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; box-sizing: border-box; transition: all 0.2s; }
        .color-circle.active { border: 2px solid var(--blue); box-shadow: 0 0 0 3px rgba(14,165,233,0.2); }
        .c-white { background: #FFFFFF; border: 2px solid #E2E8F0; }
        .c-white.active { border: 2px solid var(--blue); }
        .c-black { background: #1A1A1A; }
        .c-red { background: #EF4444; }
        .c-blue { background: #1D4ED8; }
        .c-green { background: #15803D; }
        .c-orange { background: #D97706; }
        .c-purple { background: #C084FC; }
        .c-gray { background: #94A3B8; }

        /* SEATS PICKER */
        .seats-row { display: flex; gap: 8px; margin-top: 4px; }
        .seat-btn { flex: 1; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; }
        .seat-btn.active { background: linear-gradient(135deg, #0EA5E9, #0284C7); color: white; box-shadow: 0 4px 12px rgba(14,165,233,0.3); }
        .seat-btn.inactive { background: rgba(241,245,249,0.8); color: var(--text-gray); border: 1.5px solid rgba(14,165,233,0.15); box-sizing: border-box; }

        /* PREVIEW CARD */
        .glass-card { background: rgba(255,255,255,0.72); backdrop-filter: blur(24px); box-shadow: 0 8px 32px rgba(14,165,233,0.08); border-radius: 16px; }
        .preview-card { padding: 14px 16px; border: 1.5px solid rgba(14,165,233,0.2); margin-top: 8px; display: flex; align-items: center; gap: 12px; }
        .p-icon { font-size: 24px; }
        .p-stack { display: flex; flex-direction: column; }
        .p-title { font-size: 15px; font-weight: 700; }
        .p-sub { font-size: 13px; color: var(--text-gray); margin-top: 2px; }

        /* BOTTOM CTA */
        .bottom-cta { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; z-index: 100; background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); border-top: 1px solid rgba(14,165,233,0.12); padding: 16px 20px 40px; box-sizing: border-box; }
        .btn-primary { width: 100%; height: 56px; border-radius: 16px; border: none; background: linear-gradient(135deg, #0EA5E9, #0284C7); color: white; font-size: 17px; font-weight: 600; box-shadow: 0 4px 20px rgba(14,165,233,0.35); cursor: pointer; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.98); }
    
/* ── Dark Mode ── */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%);
    color: #F0F9FF;
  }
  .glass-card {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(255,255,255,0.1) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05) !important;
  }
  .glass-nav {
    background: rgba(10,22,40,0.88) !important;
    border-bottom-color: rgba(14,165,233,0.08) !important;
  }
  .glass-sheet {
    background: rgba(13,31,60,0.92) !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  .glass-tabbar {
    background: rgba(10,22,40,0.90) !important;
    border-top-color: rgba(14,165,233,0.08) !important;
  }
  input, textarea, select {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(14,165,233,0.2) !important;
    color: #F0F9FF !important;
  }
  input::placeholder, textarea::placeholder {
    color: #64748B !important;
  }

  /* Явные инлайн-цвета — переопределить */
  [style*="color: #0C1A2E"],
  [style*="color:#0C1A2E"] { color: #F0F9FF !important; }

  [style*="background: #F1F5F9"],
  [style*="background:#F1F5F9"],
  [style*="background: rgba(241,245,249"],
  [style*="background:rgba(241,245,249"] {
    background: rgba(255,255,255,0.06) !important;
  }

  [style*="background: white"],
  [style*="background:white"],
  [style*="background: #fff"],
  [style*="background:#fff"],
  [style*="background: #ffffff"],
  [style*="background:#ffffff"] {
    background: #1A2332 !important;
  }

  /* Bottom CTA bars */
  [style*="background: rgba(255,255,255,0.88)"],
  [style*="background:rgba(255,255,255,0.88)"] {
    background: rgba(10,22,40,0.92) !important;
  }

  /* Карта */
  [style*="background: linear-gradient(160deg, #DBEAFE"],
  [style*="background:linear-gradient(160deg,#DBEAFE"] {
    background: linear-gradient(160deg, #0D1F3C, #0A2040) !important;
  }
}
</style>
</head>
<body>
    <div class="screen">
        <header class="header">
            <div class="header-row1">
                <a href="D-03-registration.html" class="back-link">← Назад</a>
            </div>
            <div class="header-row2">Шаг 2 из 4</div>
            <div class="header-row3">
                <div class="progress-fill"></div>
            </div>
        </header>

        <main class="content">
            <h1 class="title">Ваш автомобиль</h1>
            <p class="subtitle">Данные автомобиля для пассажиров</p>

            <div class="form-fields">
                <div class="grid-2">
                    <input type="text" class="input-field" placeholder="Марка (Toyota, Kia...)">
                    <input type="text" class="input-field" placeholder="Модель (Camry, Sportage...)">
                </div>

                <div class="grid-2">
                    <input type="number" class="input-field" placeholder="Год (2018)" min="2000" max="2026">
                    <input type="text" class="input-field" placeholder="Номер: 123 ABC 02" style="font-family: monospace;">
                </div>

                <div class="input-group" style="margin-top: 8px;">
                    <div class="input-label">Цвет</div>
                    <div class="color-row">
                        <div class="color-circle c-white active"></div>
                        <div class="color-circle c-black"></div>
                        <div class="color-circle c-red"></div>
                        <div class="color-circle c-blue"></div>
                        <div class="color-circle c-green"></div>
                        <div class="color-circle c-orange"></div>
                        <div class="color-circle c-purple"></div>
                        <div class="color-circle c-gray"></div>
                    </div>
                </div>

                <div class="input-group" style="margin-top: 8px;">
                    <div class="input-label">Мест для пассажиров</div>
                    <div class="seats-row">
                        <button class="seat-btn inactive">3</button>
                        <button class="seat-btn active">4✓</button>
                        <button class="seat-btn inactive">5</button>
                        <button class="seat-btn inactive">6</button>
                    </div>
                </div>
            </div>

            <div class="glass-card preview-card">
                <div class="p-icon">🚗</div>
                <div class="p-stack">
                    <div class="p-title">Toyota Camry 2018</div>
                    <div class="p-sub">Белый &middot; 123 ABC 02 &middot; 4 места</div>
                </div>
            </div>
        </main>

        <div class="bottom-cta">
            <button class="btn-primary" id="next-btn">Далее →</button>
        </div>
    </div>

    <script>
      // ─── BIRGE Prototype Navigation ───
      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('next-btn');
        if (btn) {
          btn.addEventListener('click', () => {
            window.location.href = 'D-03b-documents.html';
          });
        }
        const backBtn = document.querySelector('.back-link');
        if (backBtn) {
          backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'D-03-registration.html';
          });
        }
      });
    </script>
</body>
</html>
