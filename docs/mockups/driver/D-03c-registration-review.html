<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRGE Driver — Проверка заявки</title>
    <style>
        :root {
            --blue: #0EA5E9;
            --blue-dark: #0284C7;
            --text: #0C1A2E;
            --text-gray: #64748B;
            --text-light: #94A3B8;
            --divider: rgba(14,165,233,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 40%, #fff 100%);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            width: 393px;
            min-height: 100vh;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 24px 40px;
            position: relative;
        }

        /* ANIMATIONS */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ICON SECTION */
        .icon-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }

        .outer-ring {
            position: absolute;
            inset: 0;
            border: 2px dashed var(--blue);
            border-radius: 50%;
            animation: spin 8s linear infinite;
        }

        .inner-circle {
            position: absolute;
            inset: 10px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(14, 165, 233, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .title { font-size: 26px; font-weight: 700; text-align: center; margin-top: 20px; color: var(--text); }
        .subtitle { font-size: 16px; color: var(--text-gray); text-align: center; margin-top: 6px; }

        /* GLASS CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(14, 165, 233, 0.08);
            border-radius: 20px;
            width: 100%;
        }

        /* STATUS CARD */
        .status-card { margin-top: 28px; padding: 20px; }
        .section-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
        
        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--divider);
        }
        .status-row:last-child { border-bottom: none; }

        .circle-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bg-success { background: #D1FAE5; color: #10B981; font-size: 14px; }
        .bg-process { background: #E0F2FE; }
        .bg-pending { background: #F1F5F9; border: 2px dashed #CBD5E1; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .row-title { font-size: 15px; font-weight: 600; flex: 1; }
        .row-title.pending { color: var(--text-light); font-weight: 500; }
        .row-time { font-size: 13px; color: var(--text-light); }

        /* INFO BLOCK */
        .info-block { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-gray); line-height: 1.6; }

        /* PROGRESS SECTION */
        .progress-section { margin-top: 16px; padding: 16px; border-radius: 16px; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .progress-label { font-size: 13px; color: var(--text-gray); font-weight: 700; }
        .progress-val { font-size: 13px; color: var(--text-light); }

        .progress-bar { width: 100%; height: 6px; background: #E0F2FE; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 15%; background: linear-gradient(90deg, #0EA5E9, #10B981); border-radius: 3px; }

        /* BUTTONS */
        .button-group { margin-top: auto; padding-top: 32px; width: 100%; display: flex; flex-direction: column; gap: 10px; }
        
        .btn {
            width: 100%;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-outline {
            height: 50px;
            background: transparent;
            border: 1.5px solid var(--blue);
            color: var(--blue);
        }

        .btn-ghost {
            height: 44px;
            background: transparent;
            color: var(--text-gray);
            font-weight: 500;
        }

        .btn:active { transform: scale(0.98); opacity: 0.8; }
    
/* ── Dark Mode ── */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%);
    color: #F0F9FF;
  }
  .glass-card {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(255,255,255,0.1) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05) !important;
  }
  .glass-nav {
    background: rgba(10,22,40,0.88) !important;
    border-bottom-color: rgba(14,165,233,0.08) !important;
  }
  .glass-sheet {
    background: rgba(13,31,60,0.92) !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  .glass-tabbar {
    background: rgba(10,22,40,0.90) !important;
    border-top-color: rgba(14,165,233,0.08) !important;
  }
  input, textarea, select {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(14,165,233,0.2) !important;
    color: #F0F9FF !important;
  }
  input::placeholder, textarea::placeholder {
    color: #64748B !important;
  }

  /* Явные инлайн-цвета — переопределить */
  [style*="color: #0C1A2E"],
  [style*="color:#0C1A2E"] { color: #F0F9FF !important; }

  [style*="background: #F1F5F9"],
  [style*="background:#F1F5F9"],
  [style*="background: rgba(241,245,249"],
  [style*="background:rgba(241,245,249"] {
    background: rgba(255,255,255,0.06) !important;
  }

  [style*="background: white"],
  [style*="background:white"],
  [style*="background: #fff"],
  [style*="background:#fff"],
  [style*="background: #ffffff"],
  [style*="background:#ffffff"] {
    background: #1A2332 !important;
  }

  /* Bottom CTA bars */
  [style*="background: rgba(255,255,255,0.88)"],
  [style*="background:rgba(255,255,255,0.88)"] {
    background: rgba(10,22,40,0.92) !important;
  }

  /* Карта */
  [style*="background: linear-gradient(160deg, #DBEAFE"],
  [style*="background:linear-gradient(160deg,#DBEAFE"] {
    background: linear-gradient(160deg, #0D1F3C, #0A2040) !important;
  }
}
</style>
</head>
<body>
    <div class="screen">
        <!-- ICON SECTION -->
        <div class="icon-container">
            <div class="outer-ring"></div>
            <div class="inner-circle">⏳</div>
        </div>

        <h1 class="title">Заявка отправлена!</h1>
        <p class="subtitle">Проверяем ваши документы</p>

        <!-- STATUS CARD -->
        <div class="glass-card status-card">
            <div class="section-label">Статус проверки</div>
            
            <div class="status-row">
                <div class="circle-icon bg-success">✅</div>
                <div class="row-title">Документы получены</div>
                <div class="row-time">Только что</div>
            </div>

            <div class="status-row">
                <div class="circle-icon bg-process">
                    <div class="spinner"></div>
                </div>
                <div class="row-title">Верификация личности</div>
                <div class="row-time">~10 мин</div>
            </div>

            <div class="status-row">
                <div class="circle-icon bg-pending"></div>
                <div class="row-title pending">Проверка автомобиля</div>
                <div class="row-time">~30 мин</div>
            </div>

            <div class="status-row">
                <div class="circle-icon bg-pending"></div>
                <div class="row-title pending">Активация аккаунта</div>
                <div class="row-time">24–48 ч</div>
            </div>
        </div>

        <p class="info-block">
            📱 Мы уведомим вас по SMS и в приложении как только аккаунт будет активирован
        </p>

        <!-- PROGRESS CARD -->
        <div class="glass-card progress-section">
            <div class="progress-header">
                <div class="progress-label">⏱ Обычное время</div>
                <div class="progress-val">~24–48 часов</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <!-- BUTTONS -->
        <div class="button-group">
            <button class="btn btn-outline" id="back-to-docs">Вернуться к документам</button>
            <button class="btn btn-ghost">Написать в поддержку</button>
        </div>
    </div>

    <script>
      // ─── BIRGE Prototype Navigation ───
      document.addEventListener('DOMContentLoaded', () => {
        // Auto-transition for demo
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 3000);

        const backBtn = document.getElementById('back-to-docs');
        if (backBtn) {
          backBtn.addEventListener('click', () => {
            window.location.href = 'D-03b-documents.html';
          });
        }
      });
    </script>
</body>
</html>
