<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRGE Driver - Payout</title>
    <style>
        :root {
            --blue: #0EA5E9;
            --blue-dark: #0284C7;
            --blue-light: #E0F2FE;
            --bg: #F0F9FF;
            --text: #0C1A2E;
            --text-gray: #64748B;
            --text-light: #94A3B8;
            --divider: rgba(14,165,233,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 40%, #fff 100%);
            width: 393px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text);
            padding-bottom: 120px;
        }

        .glass-nav {
            position: fixed;
            top: 0;
            width: 393px;
            z-index: 100;
            background: rgba(240,249,255,0.88);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--divider);
            padding: 59px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-btn {
            font-size: 15px;
            color: var(--blue);
            cursor: pointer;
            text-decoration: none;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 700;
        }

        .glass-card {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 18px;
            padding: 16px 20px;
            margin: 14px 20px;
            box-shadow: 0 4px 16px rgba(14,165,233,0.05);
        }

        .balance-card {
            margin-top: 100px;
            padding: 24px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(14,165,233,0.08), rgba(2,132,199,0.03));
            border: 2px solid rgba(14,165,233,0.2);
            text-align: center;
        }

        .label {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance-val {
            font-size: 44px;
            font-weight: 700;
            color: var(--blue);
            margin-top: 8px;
        }

        .pills-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .sum-pill {
            flex: 1;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .sum-pill-active {
            background: linear-gradient(135deg, #0EA5E9, #0284C7);
            color: white;
        }

        .sum-pill-inactive {
            background: #E0F2FE;
            color: #0284C7;
        }

        .input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
        }

        .input-sum {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            border: none;
            background: transparent;
            width: 140px;
            outline: none;
            font-family: inherit;
        }

        .bank-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bank-icon {
            width: 40px;
            height: 40px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #EF4444;
        }

        .info-card {
            border-left: 3px solid var(--blue);
            background: rgba(14,165,233,0.04);
            font-size: 13px;
            color: #0284C7;
            line-height: 1.5;
            padding: 12px 14px;
            border-radius: 14px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 393px;
            z-index: 100;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--divider);
            padding: 16px 20px 40px;
        }

        .btn-primary {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #0EA5E9, #0284C7);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(14,165,233,0.35);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0A1628;
                --text: #F0F9FF;
                --text-gray: #94A3B8;
                --text-light: #64748B;
                --divider: rgba(14,165,233,0.08);
            }
            body { background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%); }
            .glass-nav, .bottom-nav { background: rgba(10,22,40,0.88); }
            .glass-card { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
            .sum-pill-inactive { background: rgba(14,165,233,0.15); color: #38BDF8; }
            .info-card { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); border-left-color: var(--blue); color: #38BDF8; }
            .input-sum { color: white; }
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <a href="D-13-earnings-detail.html" class="nav-btn">← Назад</a>
        <div class="nav-title">Вывод средств</div>
        <div style="width: 50px;"></div>
    </nav>

    <div class="glass-card balance-card">
        <div class="label">ДОСТУПНО К ВЫВОДУ</div>
        <div class="balance-val">12 450₸</div>
        <div style="font-size: 13px; color: var(--text-gray); margin-top: 4px;">За последние 7 дней</div>
    </div>

    <div class="glass-card">
        <div class="label" style="margin-bottom: 10px;">СУММА ВЫВОДА</div>
        <div class="pills-row">
            <div class="sum-pill sum-pill-inactive">5 000₸</div>
            <div class="sum-pill sum-pill-active">10 000₸</div>
            <div class="sum-pill sum-pill-inactive">Всё</div>
        </div>
        <div class="input-row">
            <span style="font-size: 20px; color: var(--text-gray);">₸</span>
            <input type="number" class="input-sum" value="10000">
        </div>
    </div>

    <div class="glass-card">
        <div class="label" style="margin-bottom: 12px;">РЕКВИЗИТЫ</div>
        <div class="bank-row">
            <div class="bank-icon">K</div>
            <div style="flex: 1;">
                <div style="font-size: 15px; font-weight: 700;">Kaspi · •••• 4782</div>
                <div style="font-size: 13px; color: var(--text-gray);">Принимает до 15 000₸ за раз</div>
            </div>
            <div style="font-size: 14px; color: var(--blue); cursor: pointer;">Изменить ›</div>
        </div>
    </div>

    <div class="glass-card info-card">
        💡 Обычно зачисляется в течение нескольких минут.<br>
        Комиссия: 0₸
    </div>

    <div class="bottom-nav">
        <button class="btn-primary" onclick="window.location.href='dashboard.html'">Вывести 10 000₸</button>
    </div>

</body>
</html>
