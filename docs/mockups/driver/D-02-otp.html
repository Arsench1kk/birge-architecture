<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRGE Drive - OTP</title>
<style>
:root {
  --blue:        #0EA5E9;
  --blue-dark:   #0284C7;
  --blue-light:  #E0F2FE;
  --bg:          #F0F9FF;
  --white:       #FFFFFF;
  --text:        #0C1A2E;
  --text-gray:   #64748B;
  --text-light:  #94A3B8;
  --divider:     rgba(14,165,233,0.12);
  --radius-card: 20px;
  --radius-btn:  16px;
  --shadow-card: 0 8px 32px rgba(14,165,233,0.08);
  --shadow-btn:  0 4px 20px rgba(14,165,233,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 40%, #fff 100%);
  min-height: 100vh;
  width: 393px;
  margin: 0 auto;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  position: relative;
}
.glass-nav {
  position: fixed; top: 0; width: 393px; z-index: 100;
  background: rgba(240,249,255,0.88);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid var(--divider);
  padding: 59px 20px 12px;
  display: flex; align-items: center;
}
.back-btn { font-size: 15px; color: var(--blue); cursor: pointer; text-decoration: none; font-weight: 500; }

.main-content {
  padding: 24px; margin-top: 100px;
}
.title-xl { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.body-md { font-size: 15px; color: var(--text-gray); margin-top: 8px; }

.otp-row {
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 40px;
}
.otp-box {
  width: 46px; height: 56px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid rgba(14,165,233,0.2);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: var(--text);
}
.otp-box.active {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
}

.timer-row {
  text-align: center; font-size: 15px; color: var(--text-gray); margin-top: 32px;
}
.timer-blue { color: var(--blue); font-weight: 700; }

.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 56px;
  border: none; border-radius: var(--radius-btn);
  font-size: 17px; font-weight: 600; cursor: pointer;
}
.btn-primary {
  background: linear-gradient(135deg, #0EA5E9, #0284C7);
  color: #fff;
  box-shadow: var(--shadow-btn);
}

.loading-hint {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 13px; color: var(--text-gray); margin-top: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #0A1628;
    --text:        #F0F9FF;
    --text-gray:   #94A3B8;
    --divider:     rgba(14,165,233,0.08);
  }
  body { background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%); }
  .glass-nav { background: rgba(10,22,40,0.88); }
  .otp-box { background: rgba(255,255,255,0.06); border-color: rgba(14,165,233,0.2); color: #F0F9FF; }
}
</style>
</head>
<body>

<div class="glass-nav">
  <a href="D-01-phone.html" class="back-btn">← Изменить номер</a>
</div>

<div class="main-content">
  <h1 class="title-xl">Введите код</h1>
  <p class="body-md">Отправили SMS на +7 777 &bull;&bull;&bull; 45 67</p>
  
  <div class="otp-row">
    <div class="otp-box active">4</div>
    <div class="otp-box">2</div>
    <div class="otp-box">7</div>
    <div class="otp-box"></div>
    <div class="otp-box"></div>
    <div class="otp-box"></div>
  </div>
  
  <div class="timer-row">
    Отправить повторно через <span class="timer-blue">45 сек</span>
  </div>
  
  <div style="margin-top: 32px;">
    <button class="btn btn-primary" onclick="window.location.href='D-03-registration.html'">Подтвердить</button>
  </div>
  
  <div class="loading-hint">
    <span>✨</span> Проверяем код...
  </div>
</div>

</body>
</html>
