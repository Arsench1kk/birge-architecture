<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRGE Drive Splash</title>
<style>
:root {
  --blue:        #0EA5E9;
  --blue-dark:   #0284C7;
  --blue-light:  #E0F2FE;
  --bg:          #0C1A2E;
  --white:       #FFFFFF;
  --text-gray:   #64748B;
  --text-light:  #94A3B8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  background: linear-gradient(160deg, #0C1A2E 0%, #0D2040 50%, #0A1628 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 393px;
  margin: 0 auto;
  overflow: hidden;
  color: white;
  -webkit-font-smoothing: antialiased;
}

.logo-container {
  text-align: center;
}

.logo-circle {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #0EA5E9, #0284C7);
  border-radius: 50%;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  line-height: 1;
  box-shadow: 0 8px 32px rgba(14,165,233,0.3);
}

.brand-title {
  font-size: 48px; font-weight: 800; color: white; letter-spacing: -1px; margin-top: 16px; line-height: 1;
}

.brand-drive {
  font-size: 18px; color: var(--text-light); letter-spacing: 4px; margin-top: 4px; text-transform: uppercase;
}

.driver-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  background: rgba(14,165,233,0.15);
  border: 1px solid rgba(14,165,233,0.3);
  color: #38BDF8;
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 700;
}

.tagline {
  margin-top: 32px;
  text-align: center;
}

.tagline-main {
  font-size: 20px; font-weight: 700; color: white;
}

.tagline-sub {
  font-size: 15px; color: var(--text-gray); margin-top: 8px;
}

.loader {
  margin-top: 48px;
  display: flex;
  gap: 8px;
  justify-content: center;
}

.dot {
  width: 8px; height: 8px;
  background: var(--blue);
  border-radius: 50%;
  animation: dotBlink 1.5s infinite ease-in-out;
}

@keyframes dotBlink {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.1); }
}

.dot:nth-child(2) { animation-delay: 0.3s; }
.dot:nth-child(3) { animation-delay: 0.6s; }

.footer {
  position: absolute; bottom: 34px; left: 0; width: 100%;
  text-align: center; font-size: 11px; color: white; opacity: 0.3;
}
</style>
</head>
<body>

<div class="logo-container">
  <div class="logo-circle">🚗</div>
  <div class="brand-title">BIRGE</div>
  <div class="brand-drive">Drive</div>
  
  <div class="driver-badge">🚗 Для водителей</div>
</div>

<div class="tagline">
  <div class="tagline-main">Зарабатывайте больше</div>
  <div class="tagline-sub">Без комиссий · Больше свободы</div>
</div>

<div class="loader">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<div class="footer">&copy; 2026 BIRGE DRIVE</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => window.location.href = 'D-01-phone.html', 2500);
});
</script>
</body>
</html>
