<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRGE Passenger - Edit Profile</title>
    <style>
        :root {
            --blue: #0EA5E9;
            --blue-dark: #0284C7;
            --bg: #F0F9FF;
            --text: #0C1A2E;
            --text-gray: #64748B;
            --text-light: #94A3B8;
            --divider: rgba(14,165,233,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 40%, #fff 100%);
            width: 393px;
            margin: 0 auto;
            min-height: 100vh;
            color: var(--text);
            padding-bottom: 120px; /* Space for bottom button */
        }

        .glass-nav {
            position: fixed;
            top: 0;
            width: 393px;
            z-index: 100;
            background: rgba(240,249,255,0.88);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-bottom: 1px solid var(--divider);
            padding: 59px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-btn {
            font-size: 15px;
            color: var(--blue);
            cursor: pointer;
            text-decoration: none;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }

        .avatar-section {
            margin-top: 110px;
            text-align: center;
            padding: 20px;
        }

        .avatar-container {
            position: relative;
            width: 84px;
            height: 84px;
            margin: 0 auto;
        }

        .avatar-circle {
            width: 84px;
            height: 84px;
            background: linear-gradient(135deg, #0EA5E9, #0284C7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 24px rgba(14,165,233,0.2);
        }

        .edit-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 26px;
            height: 26px;
            background: var(--blue);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        .change-photo {
            font-size: 14px;
            color: var(--blue);
            margin-top: 10px;
            cursor: pointer;
        }

        .input-group {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 16px rgba(14,165,233,0.05);
        }

        .input-label {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .input-field {
            border: none;
            background: transparent;
            font-size: 16px;
            color: var(--text);
            width: 100%;
            outline: none;
            padding: 0;
            font-family: inherit;
        }

        .phone-row {
            display: flex;
            align-items: center;
        }

        .info-card {
            background: rgba(14,165,233,0.04);
            border: 1px solid rgba(255,255,255,0.6);
            border-left: 3px solid var(--blue);
            border-radius: 14px;
            padding: 12px 14px;
            margin: 4px 20px 20px;
            font-size: 13px;
            color: var(--text-gray);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 393px;
            z-index: 100;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--divider);
            padding: 16px 20px 40px;
        }

        .btn-primary {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #0EA5E9, #0284C7);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(14,165,233,0.35);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0A1628;
                --text: #F0F9FF;
                --text-gray: #94A3B8;
                --text-light: #64748B;
                --divider: rgba(14,165,233,0.08);
            }
            body { background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%); }
            .glass-nav, .bottom-nav { background: rgba(10,22,40,0.88); }
            .input-group { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
            .input-field { color: var(--text); }
            .edit-badge { border-color: #1A2332; }
            .info-card { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); border-left-color: var(--blue); }
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <a href="P-19-profile.html" class="nav-btn">Отмена</a>
        <div class="nav-title">Редактировать</div>
        <div class="nav-btn" style="font-weight: 700;">Готово</div>
    </nav>

    <div class="avatar-section">
        <div class="avatar-container">
            <div class="avatar-circle">АС</div>
            <div class="edit-badge">✏</div>
        </div>
        <div class="change-photo">Изменить фото</div>
    </div>

    <div style="padding: 0 20px;">
        <div class="input-group">
            <div class="input-label">ИМЯ</div>
            <input type="text" class="input-field" value="Айгерим">
        </div>

        <div class="input-group">
            <div class="input-label">ФАМИЛИЯ</div>
            <input type="text" class="input-field" value="Сейткали">
        </div>

        <div class="input-group" style="opacity: 0.8;">
            <div class="input-label">ТЕЛЕФОН</div>
            <div class="phone-row">
                <span class="input-field" style="color: var(--text-light); flex: 1;">🇰🇿 +7 777 ••• 45 67</span>
                <span style="color: var(--text-light); font-size: 14px;">🔒</span>
            </div>
        </div>

        <div class="input-group">
            <div class="input-label">EMAIL</div>
            <input type="email" class="input-field" value="aigul@mail.ru">
        </div>

        <div class="input-group">
            <div class="input-label">ДАТА РОЖДЕНИЯ</div>
            <input type="text" class="input-field" value="14.03.1995">
        </div>
    </div>

    <div class="info-card">
        Изменение телефона доступно в настройках приватности.
    </div>

    <div class="bottom-nav">
        <button class="btn-primary" onclick="window.location.href='P-19-profile.html'">Сохранить изменения</button>
    </div>

</body>
</html>
