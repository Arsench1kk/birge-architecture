<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRGE Commute - Step 4</title>
<style>
/* CSS copied from birge-v2.css */
:root {
  --blue:        #0EA5E9;
  --blue-dark:   #0284C7;
  --blue-light:  #E0F2FE;
  --bg:          #F0F9FF;
  --white:       #FFFFFF;
  --text:        #0C1A2E;
  --text-gray:   #64748B;
  --text-light:  #94A3B8;
  --success:     #10B981;
  --warning:     #F59E0B;
  --error:       #EF4444;
  --divider:     rgba(14,165,233,0.12);
  --radius-card: 20px;
  --radius-btn:  16px;
  --radius-pill: 100px;
  --shadow-card: 0 8px 32px rgba(14,165,233,0.08),
                 inset 0 1px 0 rgba(255,255,255,0.8);
  --shadow-btn:  0 4px 20px rgba(14,165,233,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 40%, #fff 100%);
  min-height: 100vh;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.glass-card {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
}
.glass-nav {
  background: rgba(240,249,255,0.88);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid var(--divider);
}
.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 56px;
  border: none; border-radius: var(--radius-btn);
  font-size: 17px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, #0EA5E9, #0284C7);
  color: #fff;
  box-shadow: var(--shadow-btn);
}
.progress-bar {
  width: 100%; height: 4px;
  background: var(--blue-light);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #0EA5E9, #0284C7);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.screen {
  width: 393px; min-height: 852px;
  margin: 0 auto;
  position: relative; overflow: hidden;
}
.nav-bar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 393px; z-index: 100;
  padding: 59px 20px 12px;
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.back-btn { font-size: 20px; color: var(--blue); cursor: pointer; }
.step-label { font-size: 12px; color: var(--text-gray); }
.main-content { padding: 24px; margin-top: 110px; }
.title { font-size: 26px; font-weight: 700; line-height: 1.2; }
.subtitle { font-size: 15px; color: var(--text-gray); margin-top: 8px; }
.spacer-28 { height: 28px; }
.spacer-24 { height: 24px; }
.spacer-16 { height: 16px; }

.bottom-fixed {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 393px; padding: 20px 24px 40px; background: linear-gradient(transparent, #fff 30%);
}

/* Step 4 Specific */
.summary-chip {
  padding: 8px 14px; border-radius: 12px; display: inline-flex; align-items: center; gap: 6px;
  font-size: 14px; color: var(--blue);
}
.days-card {
  padding: 20px; border-radius: 18px;
}
.days-row {
  display: flex; gap: 8px; width: 100%;
}
.day-btn {
  flex: 1; height: 52px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 600; border: none; cursor: pointer; line-height: 1.2;
}
.day-btn.active {
  background: linear-gradient(135deg, #0EA5E9, #0284C7);
  color: white;
  box-shadow: 0 4px 12px rgba(14,165,233,0.3);
}
.day-btn.inactive {
  background: rgba(241,245,249,0.8);
  color: var(--text-gray);
}
.day-name { font-size: 14px; }
.day-num { font-size: 12px; opacity: 0.8; }
.days-selected-text {
  font-size: 14px; color: var(--text-gray); text-align: center; margin-top: 16px;
}
.info-card {
  padding: 16px; border-radius: 16px; border-left: 3px solid #0EA5E9;
  font-size: 14px; color: var(--text-gray); line-height: 1.5;
}

/* ── Dark Mode ── */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%);
    color: #F0F9FF;
  }
  .glass-card {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(255,255,255,0.1) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05) !important;
  }
  .glass-nav {
    background: rgba(10,22,40,0.88) !important;
    border-bottom-color: rgba(14,165,233,0.08) !important;
  }
  .glass-sheet {
    background: rgba(13,31,60,0.92) !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  .glass-tabbar {
    background: rgba(10,22,40,0.90) !important;
    border-top-color: rgba(14,165,233,0.08) !important;
  }
  input, textarea, select {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(14,165,233,0.2) !important;
    color: #F0F9FF !important;
  }
  input::placeholder, textarea::placeholder {
    color: #64748B !important;
  }

  /* Явные инлайн-цвета — переопределить */
  [style*="color: #0C1A2E"],
  [style*="color:#0C1A2E"] { color: #F0F9FF !important; }

  [style*="background: #F1F5F9"],
  [style*="background:#F1F5F9"],
  [style*="background: rgba(241,245,249"],
  [style*="background:rgba(241,245,249"] {
    background: rgba(255,255,255,0.06) !important;
  }

  [style*="background: white"],
  [style*="background:white"],
  [style*="background: #fff"],
  [style*="background:#fff"],
  [style*="background: #ffffff"],
  [style*="background:#ffffff"] {
    background: #1A2332 !important;
  }

  /* Bottom CTA bars */
  [style*="background: rgba(255,255,255,0.88)"],
  [style*="background:rgba(255,255,255,0.88)"] {
    background: rgba(10,22,40,0.92) !important;
  }

  /* Карта */
  [style*="background: linear-gradient(160deg, #DBEAFE"],
  [style*="background:linear-gradient(160deg,#DBEAFE"] {
    background: linear-gradient(160deg, #0D1F3C, #0A2040) !important;
  }
}
</style>
</head>
<body>
<div class="screen">
  <div class="nav-bar glass-nav">
    <div class="header-top">
      <div class="back-btn">&#8592;</div>
      <div class="step-label">Шаг 4 из 5</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width: 80%;"></div>
    </div>
  </div>
  
  <div class="main-content">
    <div class="glass-card summary-chip">
      &#128205; Алатау &rarr; Есентай  &middot;  07:30 / 18:00
    </div>
    
    <div class="spacer-16"></div>
    <div class="title">В какие дни вы едете?</div>
    <div class="subtitle">Выберите дни недели</div>
    
    <div class="spacer-28"></div>
    
    <div class="glass-card days-card">
      <div class="days-row">
        <button class="day-btn active"><span class="day-name">Пн</span><span class="day-num">5</span></button>
        <button class="day-btn active"><span class="day-name">Вт</span><span class="day-num">6</span></button>
        <button class="day-btn active"><span class="day-name">Ср</span><span class="day-num">7</span></button>
        <button class="day-btn active"><span class="day-name">Чт</span><span class="day-num">8</span></button>
        <button class="day-btn active"><span class="day-name">Пт</span><span class="day-num">9</span></button>
        <button class="day-btn inactive"><span class="day-name">Сб</span><span class="day-num">10</span></button>
        <button class="day-btn inactive"><span class="day-name">Вс</span><span class="day-num">11</span></button>
      </div>
      <div class="days-selected-text">Выбрано: 5 дней в неделю</div>
    </div>
    
    <div class="spacer-24"></div>
    
    <div class="glass-card info-card">
      &#128161; Совет: Выберите все дни когда регулярно совершаете этот маршрут.<br>AI учитывает частоту при подборе попутчиков.
    </div>
  </div>
  
  <div class="bottom-fixed">
    <button class="btn btn-primary">Далее &#8594;</button>
  </div>
</div>

<script>
// ─── BIRGE Prototype Navigation ───
document.addEventListener('DOMContentLoaded', () => {
  function addClickByText(text, href) {
    const all = document.querySelectorAll('button, a, [role="button"]');
    all.forEach(el => {
      if (el.textContent.trim().includes(text)) {
        el.style.cursor = 'pointer';
        el.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = href;
        });
      }
    });
  }
  addClickByText('Далее', 'P-03e-commute-step5.html');
  addClickByText('←', 'P-03c-commute-step3.html');
});
</script>
</body>
</html>
