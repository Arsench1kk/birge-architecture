<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRGE Phone</title>
<style>
/* CSS copied from birge-v2.css */
:root {
  --blue:        #0EA5E9;
  --blue-dark:   #0284C7;
  --blue-light:  #E0F2FE;
  --bg:          #F0F9FF;
  --white:       #FFFFFF;
  --text:        #0C1A2E;
  --text-gray:   #64748B;
  --text-light:  #94A3B8;
  --success:     #10B981;
  --warning:     #F59E0B;
  --error:       #EF4444;
  --divider:     rgba(14,165,233,0.12);
  --radius-card: 20px;
  --radius-btn:  16px;
  --radius-pill: 100px;
  --shadow-card: 0 8px 32px rgba(14,165,233,0.08),
                 inset 0 1px 0 rgba(255,255,255,0.8);
  --shadow-btn:  0 4px 20px rgba(14,165,233,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 40%, #fff 100%);
  min-height: 100vh;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.glass-nav {
  background: rgba(240,249,255,0.88);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid var(--divider);
}
.glass-card {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
}
.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 56px;
  border: none; border-radius: var(--radius-btn);
  font-size: 17px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, #0EA5E9, #0284C7);
  color: #fff;
  box-shadow: var(--shadow-btn);
}
.title-xl  { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.body-md   { font-size: 15px; font-weight: 400; }
.caption   { font-size: 13px; font-weight: 400; color: var(--text-gray); text-align: center; }

.screen {
  width: 393px; min-height: 852px;
  margin: 0 auto;
  position: relative; overflow: hidden;
}
.nav-bar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 393px; z-index: 100;
  padding: 59px 20px 12px;
  display: flex; align-items: center;
}
.back-btn { font-size: 20px; color: var(--blue); cursor: pointer; }
.main-content {
  padding: 24px; margin-top: 80px;
}
.spacer-32 { height: 32px; }
.spacer-12 { height: 12px; }

.input-row {
  display: flex; align-items: center;
  padding: 4px;
  border-radius: 18px;
}
.input-left {
  width: 60px; display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: bold; color: var(--blue); gap: 4px;
}
.input-divider {
  width: 1px; height: 28px; background: rgba(14,165,233,0.2);
}
.input-right {
  border: none; background: transparent; font-size: 17px; flex: 1; padding: 16px; outline: none; color: var(--text);
}
.bottom-card {
  margin: 24px; padding: 16px; border-radius: 16px;
  position: absolute; bottom: 34px; width: calc(100% - 48px);
}
.bottom-card-text {
  font-size: 13px; color: var(--text-gray); text-align: center;
}

/* ── Dark Mode ── */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%);
    color: #F0F9FF;
  }
  .glass-card {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(255,255,255,0.1) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05) !important;
  }
  .glass-nav {
    background: rgba(10,22,40,0.88) !important;
    border-bottom-color: rgba(14,165,233,0.08) !important;
  }
  .glass-sheet {
    background: rgba(13,31,60,0.92) !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  .glass-tabbar {
    background: rgba(10,22,40,0.90) !important;
    border-top-color: rgba(14,165,233,0.08) !important;
  }
  input, textarea, select {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(14,165,233,0.2) !important;
    color: #F0F9FF !important;
  }
  input::placeholder, textarea::placeholder {
    color: #64748B !important;
  }

  /* Явные инлайн-цвета — переопределить */
  [style*="color: #0C1A2E"],
  [style*="color:#0C1A2E"] { color: #F0F9FF !important; }

  [style*="background: #F1F5F9"],
  [style*="background:#F1F5F9"],
  [style*="background: rgba(241,245,249"],
  [style*="background:rgba(241,245,249"] {
    background: rgba(255,255,255,0.06) !important;
  }

  [style*="background: white"],
  [style*="background:white"],
  [style*="background: #fff"],
  [style*="background:#fff"],
  [style*="background: #ffffff"],
  [style*="background:#ffffff"] {
    background: #1A2332 !important;
  }

  /* Bottom CTA bars */
  [style*="background: rgba(255,255,255,0.88)"],
  [style*="background:rgba(255,255,255,0.88)"] {
    background: rgba(10,22,40,0.92) !important;
  }

  /* Карта */
  [style*="background: linear-gradient(160deg, #DBEAFE"],
  [style*="background:linear-gradient(160deg,#DBEAFE"] {
    background: linear-gradient(160deg, #0D1F3C, #0A2040) !important;
  }
}
</style>
</head>
<body>
<div class="screen">
  <div class="nav-bar glass-nav">
    <div class="back-btn">&#8592;</div>
  </div>
  
  <div class="main-content">
    <div class="title-xl" style="color: var(--text)">Войти в BIRGE</div>
    <div class="body-md" style="color: var(--text-gray); margin-top: 8px;">Введите номер телефона</div>
    
    <div class="spacer-32"></div>
    
    <div class="glass-card input-row">
      <div class="input-left">
        <span>&#127472;&#127487;</span>
        <span>+7</span>
      </div>
      <div class="input-divider"></div>
      <input type="tel" class="input-right" placeholder="(777) 000-00-00">
    </div>
    
    <div class="spacer-12"></div>
    
    <div class="caption">На этот номер придёт SMS с кодом</div>
    
    <div class="spacer-32"></div>
    
    <button class="btn btn-primary">Продолжить</button>
  </div>
  
  <div class="glass-card bottom-card">
    <div class="bottom-card-text">
      &#128274; Ваши данные защищены. Мы не передаём номер третьим лицам.
    </div>
  </div>
</div>

<script>
// ─── BIRGE Prototype Navigation ───
document.addEventListener('DOMContentLoaded', () => {
  function addClickByText(text, href) {
    const all = document.querySelectorAll('button, a, [role="button"]');
    all.forEach(el => {
      if (el.textContent.trim().includes(text)) {
        el.style.cursor = 'pointer';
        el.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = href;
        });
      }
    });
  }
  addClickByText('Продолжить', 'P-02-otp.html');
});
</script>
</body>
</html>
