<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRGE Commute - Step 5</title>
<style>
/* CSS copied from birge-v2.css */
:root {
  --blue:        #0EA5E9;
  --blue-dark:   #0284C7;
  --blue-light:  #E0F2FE;
  --bg:          #F0F9FF;
  --white:       #FFFFFF;
  --text:        #0C1A2E;
  --text-gray:   #64748B;
  --text-light:  #94A3B8;
  --success:     #10B981;
  --warning:     #F59E0B;
  --error:       #EF4444;
  --divider:     rgba(14,165,233,0.12);
  --radius-card: 20px;
  --radius-btn:  16px;
  --radius-pill: 100px;
  --shadow-card: 0 8px 32px rgba(14,165,233,0.08),
                 inset 0 1px 0 rgba(255,255,255,0.8);
  --shadow-btn:  0 4px 20px rgba(14,165,233,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  background: linear-gradient(160deg, #E0F2FE 0%, #F0F9FF 40%, #fff 100%);
  min-height: 100vh;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.glass-card {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
}
.glass-nav {
  background: rgba(240,249,255,0.88);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid var(--divider);
}
.btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 56px;
  border: none; border-radius: var(--radius-btn);
  font-size: 17px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, #0EA5E9, #0284C7);
  color: #fff;
  box-shadow: var(--shadow-btn);
}
.btn-outline {
  background: transparent;
  color: var(--blue);
  border: 1.5px solid var(--blue);
  height: 52px;
}
.progress-bar {
  width: 100%; height: 4px;
  background: var(--blue-light);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #0EA5E9, #10B981); /* Green success gradient */
  border-radius: 2px;
  transition: width 0.3s ease;
}
.screen {
  width: 393px; min-height: 852px;
  margin: 0 auto;
  position: relative; overflow: hidden;
}
.nav-bar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 393px; z-index: 100;
  padding: 59px 20px 12px;
}
.header-top { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 8px; }
.step-label { font-size: 12px; color: var(--text-gray); }
.main-content { padding: 24px; margin-top: 110px; }
.spacer-24 { height: 24px; }
.spacer-16 { height: 16px; }

.bottom-fixed {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 393px; padding: 20px 24px 40px; background: linear-gradient(transparent, #fff 30%);
}
.bottom-caption {
  font-size: 12px; color: var(--text-gray); text-align: center; margin-top: 8px;
}

/* Step 5 Specific */
.success-section {
  display: flex; flex-direction: column; align-items: center; text-align: center;
}
.success-icon {
  width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #0EA5E9, #0284C7);
  color: white; font-size: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center;
}
.success-title {
  font-size: 20px; font-weight: 700; color: var(--text); margin-top: 12px;
}
.success-sub {
  font-size: 15px; color: var(--text-gray); margin-top: 4px;
}

.summary-card {
  padding: 20px; border-radius: 20px;
}
.summary-top {
  display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--text);
}
.blue-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--blue);
}
.card-divider {
  height: 1px; background: var(--divider); margin: 12px 0;
}
.loc-row {
  display: flex; align-items: center; gap: 8px; font-size: 15px; color: var(--text);
}
.loc-bold { font-weight: 700; }
.loc-arrow {
  color: var(--blue); margin: 4px 0 4px 12px; font-size: 14px; text-align: left;
}
.info-row {
  display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-gray); margin-bottom: 6px;
}
.info-row:last-child { margin-bottom: 0; }

.ai-status-row {
  display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--blue); font-style: italic;
}
.pulse-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--blue);
  animation: pulse-dot 1.5s infinite;
}
@keyframes pulse-dot {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1.4); opacity: 0; }
}


/* ── Dark Mode ── */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(160deg, #0A1628 0%, #0D1F3C 40%, #111827 100%);
    color: #F0F9FF;
  }
  .glass-card {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(255,255,255,0.1) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05) !important;
  }
  .glass-nav {
    background: rgba(10,22,40,0.88) !important;
    border-bottom-color: rgba(14,165,233,0.08) !important;
  }
  .glass-sheet {
    background: rgba(13,31,60,0.92) !important;
    border-color: rgba(255,255,255,0.08) !important;
  }
  .glass-tabbar {
    background: rgba(10,22,40,0.90) !important;
    border-top-color: rgba(14,165,233,0.08) !important;
  }
  input, textarea, select {
    background: rgba(255,255,255,0.06) !important;
    border-color: rgba(14,165,233,0.2) !important;
    color: #F0F9FF !important;
  }
  input::placeholder, textarea::placeholder {
    color: #64748B !important;
  }

  /* Явные инлайн-цвета — переопределить */
  [style*="color: #0C1A2E"],
  [style*="color:#0C1A2E"] { color: #F0F9FF !important; }

  [style*="background: #F1F5F9"],
  [style*="background:#F1F5F9"],
  [style*="background: rgba(241,245,249"],
  [style*="background:rgba(241,245,249"] {
    background: rgba(255,255,255,0.06) !important;
  }

  [style*="background: white"],
  [style*="background:white"],
  [style*="background: #fff"],
  [style*="background:#fff"],
  [style*="background: #ffffff"],
  [style*="background:#ffffff"] {
    background: #1A2332 !important;
  }

  /* Bottom CTA bars */
  [style*="background: rgba(255,255,255,0.88)"],
  [style*="background:rgba(255,255,255,0.88)"] {
    background: rgba(10,22,40,0.92) !important;
  }

  /* Карта */
  [style*="background: linear-gradient(160deg, #DBEAFE"],
  [style*="background:linear-gradient(160deg,#DBEAFE"] {
    background: linear-gradient(160deg, #0D1F3C, #0A2040) !important;
  }
}
</style>
</head>
<body>
<div class="screen">
  <div class="nav-bar glass-nav">
    <div class="header-top">
      <div class="step-label">Готово! &#127881;</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width: 100%;"></div>
    </div>
  </div>
  
  <div class="main-content">
    <div class="success-section">
      <div class="success-icon">&#10003;</div>
      <div class="success-title">Маршрут добавлен!</div>
      <div class="success-sub">AI начинает подбирать попутчиков</div>
    </div>
    
    <div class="spacer-24"></div>
    
    <div class="glass-card summary-card">
      <div class="summary-top">
        <div class="blue-dot"></div> Маршрут 1
      </div>
      <div class="card-divider"></div>
      
      <div class="loc-row loc-bold"><span>&#128205;</span> Алатау, пр. Аль-Фараби</div>
      <div class="loc-arrow">&#8595;</div>
      <div class="loc-row"><span>&#127937;</span> Есентай Парк, 77/8</div>
      
      <div class="card-divider"></div>
      
      <div class="info-row"><span>&#9200;</span> 07:30 утром &middot; 18:00 вечером</div>
      <div class="info-row"><span>&#128197;</span> Пн, Вт, Ср, Чт, Пт (5 дней)</div>
      
      <div class="card-divider"></div>
      
      <div class="ai-status-row">
        <div class="pulse-dot"></div>
        AI анализирует похожие маршруты...
      </div>
    </div>
    
    <div class="spacer-16"></div>
    
    <button class="btn btn-outline">+ Добавить ещ&euml; маршрут</button>
  </div>
  
  <div class="bottom-fixed">
    <button class="btn btn-primary">Найти мои коридоры &#8594;</button>
    <div class="bottom-caption">Обычно AI подбирает варианты за 1&ndash;2 минуты</div>
  </div>
</div>

<script>
// ─── BIRGE Prototype Navigation ───
document.addEventListener('DOMContentLoaded', () => {
  function addClickByText(text, href) {
    const all = document.querySelectorAll('button, a, [role="button"]');
    all.forEach(el => {
      if (el.textContent.trim().includes(text)) {
        el.style.cursor = 'pointer';
        el.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = href;
        });
      }
    });
  }
  addClickByText('коридоры', 'P-04-home.html');
  addClickByText('←', 'P-03d-commute-step4.html');
});
</script>
</body>
</html>
